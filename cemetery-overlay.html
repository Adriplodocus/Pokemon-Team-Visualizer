<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { background: transparent; }
body { padding: 5px; }
#root {
    display: grid;
    gap: 10px;
}
.pk-entry {
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.pk-entry img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    display: block;
    animation: fadeSlideUp 0.35s ease forwards;
    opacity: 0;
}
.pk-overflow {
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: Anton, 'Arial Narrow Bold', sans-serif;
    font-size: 56px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    animation: fadeSlideUp 0.35s ease forwards;
    opacity: 0;
}
@keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
(function () {
    var id = new URLSearchParams(location.search).get('id');
    if (!id) return;

    function applyOverlayTypo(data) {
        var t = data.typography || {};
        var font        = t.font        || 'Anton';
        var size        = t.size        || 56;
        var color       = t.textColor   || '#ffffff';
        var strokeW     = t.strokeWidth || 0;
        var strokeColor = t.strokeColor || '#000000';

        var fontLink = document.getElementById('gf-link');
        var newHref  = 'https://fonts.googleapis.com/css2?family=' + font.replace(/ /g, '+') + ':wght@400;700&display=swap';
        if (!fontLink) {
            fontLink    = document.createElement('link');
            fontLink.id = 'gf-link';
            fontLink.rel = 'stylesheet';
            document.head.appendChild(fontLink);
        }
        if (fontLink.href !== newHref) fontLink.href = newHref;

        var styleEl = document.getElementById('ov-typo-style');
        if (!styleEl) {
            styleEl    = document.createElement('style');
            styleEl.id = 'ov-typo-style';
            document.head.appendChild(styleEl);
        }
        var sp = strokeW > 0 ? strokeW + 'px' : '0';
        styleEl.textContent = '.pk-overflow{color:' + color + ';font-family:\'' + font + '\',Anton,\'Arial Narrow Bold\',sans-serif;font-size:' + size + 'px;-webkit-text-stroke:' + sp + ' ' + strokeColor + ';paint-order:stroke fill;}';
    }

    function renderCemetery(data) {
        // Normalize nested shape { cemetery, cemeteryConfig, cemeteryTypo } → flat
        if (data.cemeteryConfig) {
            data = {
                pokemon:    data.pokemon || [],
                cols:       data.cemeteryConfig.cols,
                rows:       data.cemeteryConfig.rows,
                overflow:   data.cemeteryConfig.overflow,
                typography: data.cemeteryTypo,
            };
        }
        var pokemon      = data.pokemon  || [];
        var cols         = Math.max(1, parseInt(data.cols, 10) || 4);
        var rows         = Math.max(1, parseInt(data.rows, 10) || 3);
        var showOverflow = data.overflow !== false;
        var capacity     = cols * rows;
        var root         = document.getElementById('root');

        if (data.typography) applyOverlayTypo(data);

        root.style.gridTemplateColumns = 'repeat(' + cols + ', 100px)';
        root.style.gridTemplateRows    = 'repeat(' + rows + ', 100px)';

        root.innerHTML = '';

        var hasOverflow = showOverflow && (pokemon.length > capacity);
        var maxVisible  = hasOverflow ? capacity - 1 : capacity;
        var visible     = pokemon.slice(0, maxVisible);

        visible.forEach(function (entry) {
            if (!entry || !entry.url) return;
            var div = document.createElement('div');
            div.className = 'pk-entry';
            var img = document.createElement('img');
            img.src = entry.url;
            if (entry.fallback) {
                var fallback = entry.fallback;
                img.onerror = function () {
                    if (img.src !== fallback) { img.src = fallback; img.onerror = null; }
                };
            }
            div.appendChild(img);
            root.appendChild(div);
        });

        if (hasOverflow) {
            var extra = pokemon.length - (capacity - 1);
            var div = document.createElement('div');
            div.className = 'pk-overflow';
            div.textContent = '+' + extra;
            root.appendChild(div);
        }
    }

    fetch('/api/load?id=' + id + '&event=cemetery-update')
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) { if (data && !data.error) renderCemetery(data); })
        .catch(function () {});

    var ably    = new Ably.Realtime({ authUrl: '/api/token?id=' + id });
    var channel = ably.channels.get('ptv-' + id, { params: { rewind: '1' } });
    channel.subscribe('cemetery-update', function (msg) {
        try {
            renderCemetery(JSON.parse(msg.data));
        } catch (e) {}
    });

    ably.connection.on('failed', function (s) { console.error('[PTV] Ably failed:', s.reason); });
    channel.on('failed', function (s)         { console.error('[PTV] Channel failed:', s.reason); });
})();
</script>
</body>
</html>
