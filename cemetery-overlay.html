<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { background: transparent; }
body { padding: 8px; }
#root {
    display: grid;
    gap: 8px;
}
.pk-entry {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.pk-entry img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    display: block;
    animation: fadeSlideUp 0.35s ease forwards;
    opacity: 0;
}
.pk-overflow {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: Anton, 'Arial Narrow Bold', sans-serif;
    font-size: 40px;
    text-shadow: 3px 3px 0 #000, -3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000;
    animation: fadeSlideUp 0.35s ease forwards;
    opacity: 0;
}
@keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
(function () {
    var id = new URLSearchParams(location.search).get('id');
    if (!id) return;

    function renderCemetery(data) {
        var pokemon  = data.pokemon  || [];
        var cols     = Math.max(1, parseInt(data.cols, 10) || 4);
        var rows     = Math.max(1, parseInt(data.rows, 10) || 4);
        var capacity = cols * rows;
        var root     = document.getElementById('root');

        root.style.gridTemplateColumns = 'repeat(' + cols + ', 120px)';
        root.style.gridTemplateRows    = 'repeat(' + rows + ', 120px)';

        root.innerHTML = '';

        var overflow = pokemon.length > capacity;
        var visible  = overflow ? pokemon.slice(0, capacity - 1) : pokemon;

        visible.forEach(function (entry) {
            if (!entry || !entry.url) return;
            var div = document.createElement('div');
            div.className = 'pk-entry';
            var img = document.createElement('img');
            img.src = entry.url;
            if (entry.fallback) {
                var fallback = entry.fallback;
                img.onerror = function () {
                    if (img.src !== fallback) { img.src = fallback; img.onerror = null; }
                };
            }
            div.appendChild(img);
            root.appendChild(div);
        });

        if (overflow) {
            var extra = pokemon.length - (capacity - 1);
            var div = document.createElement('div');
            div.className = 'pk-overflow';
            div.textContent = '+' + extra;
            root.appendChild(div);
        }
    }

    var ably    = new Ably.Realtime({ authUrl: '/api/token' });
    var channel = ably.channels.get('ptv-' + id, { params: { rewind: '1' } });
    channel.subscribe('cemetery-update', function (msg) {
        try {
            renderCemetery(JSON.parse(msg.data));
        } catch (e) {}
    });

    ably.connection.on('failed', function (s) { console.error('[PTV] Ably failed:', s.reason); });
    channel.on('failed', function (s)         { console.error('[PTV] Channel failed:', s.reason); });
})();
</script>
</body>
</html>
