<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link id="overlay-font-link" href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body,html{margin:0;padding:0;background:transparent;}

/* ── Horizontal ── */
body.layout-horizontal .container{display:flex;flex-wrap:nowrap;}
body.layout-horizontal .pkDiv{flex:0 0 225px;width:225px;height:150px;}
body.layout-horizontal .shadowDiv{flex:0 0 225px;width:225px;height:40px;padding-top:5px;}
body.layout-horizontal .sprite-row{position:relative;z-index:1;}
body.layout-horizontal .shadow-row{margin-top:-15px;}
body.layout-horizontal .nameDiv{flex:0 0 225px;width:225px;}
body.layout-horizontal img{width:100%;max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;user-select:none;}
body.layout-horizontal p{height:25px;text-align:center;}

/* ── Vertical ── */
body.layout-vertical .wrapper{display:flex;flex-direction:column;}
body.layout-vertical .pair{display:flex;flex-direction:column;margin:0;padding:0;margin-bottom:20px;width:225px;align-items:center;}
body.layout-vertical .pkDiv{width:225px;}
body.layout-vertical .shadowDiv{width:150px;margin-top:-15px;}
body.layout-vertical img{display:block;width:100%;height:auto;max-height:100px;object-fit:contain;pointer-events:none;user-select:none;}
body.layout-vertical p{margin:0;padding:0;height:25px;text-align:center;}

/* ── Animations ── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

body.layout-horizontal .pkDiv,
body.layout-horizontal .shadowDiv{animation:fadeSlideUp 0.45s ease forwards;opacity:0;}
body.layout-horizontal .pkDiv:nth-child(1),body.layout-horizontal .shadowDiv:nth-child(1){animation-delay:0.00s;}
body.layout-horizontal .pkDiv:nth-child(2),body.layout-horizontal .shadowDiv:nth-child(2){animation-delay:0.12s;}
body.layout-horizontal .pkDiv:nth-child(3),body.layout-horizontal .shadowDiv:nth-child(3){animation-delay:0.24s;}
body.layout-horizontal .pkDiv:nth-child(4),body.layout-horizontal .shadowDiv:nth-child(4){animation-delay:0.36s;}
body.layout-horizontal .pkDiv:nth-child(5),body.layout-horizontal .shadowDiv:nth-child(5){animation-delay:0.48s;}
body.layout-horizontal .pkDiv:nth-child(6),body.layout-horizontal .shadowDiv:nth-child(6){animation-delay:0.60s;}

body.layout-vertical .pair{animation:fadeSlideUp 0.45s ease forwards;opacity:0;}
body.layout-vertical .pair:nth-child(1){animation-delay:0.00s;}
body.layout-vertical .pair:nth-child(2){animation-delay:0.12s;}
body.layout-vertical .pair:nth-child(3){animation-delay:0.24s;}
body.layout-vertical .pair:nth-child(4){animation-delay:0.36s;}
body.layout-vertical .pair:nth-child(5){animation-delay:0.48s;}
body.layout-vertical .pair:nth-child(6){animation-delay:0.60s;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
(function () {
    var SHADOW_URL   = 'https://i.postimg.cc/xdmpF4Tm/Shadow.png';
    var POKEBALL_URL = 'https://i.postimg.cc/0QdW9KS2/Pokeball-Background.png';

    var id = new URLSearchParams(location.search).get('id');
    if (!id) return;

    function renderTeam(data) {
        var team    = data.team    || [];
        var layout  = data.layout  || 'horizontal';
        var shadows = data.shadows !== false;
        var bg      = data.bg      !== false;
        var typo = data.typography || {
            font: 'Anton', size: 35, textColor: '#ffffff',
            strokeWidth: 3, strokeColor: '#000000'
        };

        var fontLink = document.getElementById('overlay-font-link');
        var gfFamily = typo.font.replace(/ /g, '+');
        var newHref  = 'https://fonts.googleapis.com/css2?family=' + gfFamily + ':wght@400;700&display=swap';
        if (fontLink.href !== newHref) fontLink.href = newHref;

        var strokePx = typo.strokeWidth > 0 ? typo.strokeWidth + 'px' : '0';
        var pStyle = [
            'color:' + typo.textColor,
            "font-family:'" + typo.font + "',Anton,'Arial Narrow Bold',sans-serif",
            'font-size:' + typo.size + 'px',
            '-webkit-text-stroke:' + strokePx + ' ' + typo.strokeColor,
            'paint-order:stroke fill',
        ].join(';');

        var root    = document.getElementById('root');

        root.innerHTML = '';
        document.body.className = 'layout-' + layout;

        function makeImg(src, fallback, style) {
            var img = document.createElement('img');
            img.src = src;
            if (style) img.style.cssText = style;
            if (fallback && fallback !== src) {
                img.onerror = function () {
                    if (img.src !== fallback) { img.src = fallback; img.onerror = null; }
                };
            }
            return img;
        }

        if (layout === 'vertical') {
            var wrapper = document.createElement('div');
            wrapper.className = 'wrapper';
            team.forEach(function (slot) {
                if (!slot || !slot.url) return;
                var pair = document.createElement('div');
                pair.className = 'pair';

                var pk = document.createElement('div');
                pk.className = 'pkDiv';
                var p = document.createElement('p');
                p.style.cssText = pStyle;
                p.textContent = slot.mote || '';
                if (typo.namePosition !== 'below') pk.appendChild(p);
                if (bg) pk.appendChild(makeImg(POKEBALL_URL, null, 'position:absolute;width:225px;height:150px;z-index:-1;'));
                pk.appendChild(makeImg(slot.url, slot.fallback, null));

                var sh = document.createElement('div');
                sh.className = 'shadowDiv';
                if (shadows) sh.appendChild(makeImg(SHADOW_URL, null, null));

                pair.appendChild(pk);
                pair.appendChild(sh);
                if (typo.namePosition === 'below') pair.appendChild(p);
                wrapper.appendChild(pair);
            });
            root.appendChild(wrapper);
        } else {
            var nameAbove = typo.namePosition !== 'below';
            var nameAboveRow = nameAbove ? document.createElement('div') : null;
            if (nameAboveRow) nameAboveRow.className = 'container';
            var top = document.createElement('div');
            top.className = 'container sprite-row';
            var bot = document.createElement('div');
            bot.className = 'container shadow-row';
            var nameBelowRow = !nameAbove ? document.createElement('div') : null;
            if (nameBelowRow) nameBelowRow.className = 'container';
            team.forEach(function (slot) {
                if (!slot || !slot.url) return;
                var pk = document.createElement('div');
                pk.className = 'pkDiv';
                if (bg) pk.appendChild(makeImg(POKEBALL_URL, null, 'position:absolute;width:225px;height:150px;z-index:-1;'));
                pk.appendChild(makeImg(slot.url, slot.fallback, null));
                top.appendChild(pk);

                var sh = document.createElement('div');
                sh.className = 'shadowDiv';
                if (shadows) sh.appendChild(makeImg(SHADOW_URL, null, null));
                bot.appendChild(sh);

                var p = document.createElement('p');
                p.style.cssText = pStyle;
                p.textContent = slot.mote || '';
                var nd = document.createElement('div');
                nd.className = 'nameDiv';
                nd.appendChild(p);
                if (nameAboveRow) nameAboveRow.appendChild(nd);
                if (nameBelowRow) nameBelowRow.appendChild(nd);
            });
            if (nameAboveRow) root.appendChild(nameAboveRow);
            root.appendChild(top);
            root.appendChild(bot);
            if (nameBelowRow) root.appendChild(nameBelowRow);
        }
    }

    function fitToViewport() {
        var root = document.getElementById('root');
        root.style.transform = 'none';
        root.style.transformOrigin = 'top left';
        var rw = root.scrollWidth;
        var rh = root.scrollHeight;
        if (!rw || !rh) return;
        var scale = Math.min(window.innerWidth / rw, window.innerHeight / rh);
        if (scale !== 1) root.style.transform = 'scale(' + scale + ')';
    }
    window.addEventListener('resize', fitToViewport);

    var ably = new Ably.Realtime({ authUrl: '/api/token' });
    var channel = ably.channels.get('ptv-' + id, { params: { rewind: '1' } });
    channel.subscribe('update', function (msg) {
        try { renderTeam(JSON.parse(msg.data)); fitToViewport(); } catch (e) {}
    });

    ably.connection.on('failed', function (stateChange) {
        console.error('[PTV] Ably connection failed:', stateChange.reason);
    });
    channel.on('failed', function (stateChange) {
        console.error('[PTV] Channel failed:', stateChange.reason);
    });
})();
</script>
</body>
</html>
