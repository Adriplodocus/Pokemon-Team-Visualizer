<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cementerio — Pokémon Stream Visualizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='white'/><path d='M2,16 A14,14 0 0,1 30,16 Z' fill='%23EE1515'/><circle cx='16' cy='16' r='14' fill='none' stroke='%231a1a1a' stroke-width='2'/><line x1='2' y1='16' x2='30' y2='16' stroke='%231a1a1a' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='%231a1a1a'/><circle cx='16' cy='16' r='3' fill='white'/></svg>">
<link rel="stylesheet" href="style.css">
<link id="gf-batch" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Alfa+Slab+One&family=Anton&family=Bangers&family=Bebas+Neue&family=Black+Han+Sans&family=Black+Ops+One&family=Boogaloo&family=Carter+One&family=Changa+One&family=Chewy&family=Cinzel&family=Concert+One&family=Creepster&family=Exo+2:wght@700&family=Fascinate&family=Fredoka+One&family=Fugaz+One&family=Graduate&family=Gugi&family=Josefin+Sans:wght@700&family=Knewave&family=Lilita+One&family=Lobster&family=Luckiest+Guy&family=Montserrat:wght@700&family=Nunito:wght@700&family=Orbitron:wght@700&family=Oswald:wght@700&family=Oxanium:wght@700&family=Pacifico&family=Passion+One&family=Patua+One&family=Permanent+Marker&family=Pirata+One&family=Poller+One&family=Press+Start+2P&family=Racing+Sans+One&family=Righteous&family=Rubik:wght@700&family=Russo+One&family=Sigmar+One&family=Skranji&family=Squada+One&family=Titan+One&family=Viga&family=Yanone+Kaffeesatz:wght@700&display=swap">
<meta name="theme-color" content="#00CCFF">
<script src="pokemon-catalog.js?v=3"></script>
<script src="lang.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
</head>
<body>
<script>const ACTIVE_PAGE = 'cemetery';</script>
<script src="patch-notes.js"></script>
<script src="header.js"></script>
<div id="app">
<div id="external-banner" class="external-banner hidden"></div>

<div class="pokemon-desktop-layout">

    <!-- Live preview -->
    <div class="card card--preview" id="cemetery-preview-card">
        <button id="cemetery-preview-bg-toggle" title="Toggle preview background" onclick="toggleCemeteryPreviewBg()">☀</button>
        <div id="cemetery-preview-wrapper">
            <iframe id="cemetery-preview-iframe" scrolling="no" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Bottom row: editor + actions -->
    <div class="pokemon-bottom-cols">
    <div class="desktop-col-left">

        <!-- Add Pokémon -->
        <div class="card card--team card--cemetery-add">
            <div class="cemetery-add-row">
                <img id="cemetery-pending-sprite" class="cemetery-pending-sprite" src="" alt="" style="display:none">
                <div class="ac-wrapper" id="cemetery-ac-wrapper">
                    <input id="cemetery-name-input" type="text" class="name-input" autocomplete="off" spellcheck="false" placeholder="Nombre...">
                    <ul id="cemetery-suggestions" class="suggestions"></ul>
                </div>
<button id="cemetery-props-btn" class="props-btn" onclick="openModal()">Propiedades</button>
                <button id="cemetery-add-btn" class="btn-publish" onclick="addToCemetery()">Añadir al cementerio</button>
            </div>
        </div>

        <!-- Cemetery list -->
        <div class="card card--team">
            <p id="cemetery-count" class="cemetery-count" style="display:none"></p>
            <p id="cemetery-empty" class="cemetery-empty" style="display:none">Ningún Pokémon en el cementerio.</p>
            <div id="cemetery-list" class="cemetery-list"></div>
        </div>

    </div><!-- /desktop-col-left -->
    <div class="pokemon-actions-col">

        <!-- Grid config -->
        <div class="card card--typography">
            <div class="typo-row">
                <span class="typo-label" id="cemetery-cols-label">Cols</span>
                <input type="range" id="cemetery-cols-slider" min="1" max="10" value="4">
                <span class="typo-val" id="cemetery-cols-val">4</span>
            </div>
            <div class="typo-row">
                <span class="typo-label" id="cemetery-rows-label">Rows</span>
                <input type="range" id="cemetery-rows-slider" min="1" max="10" value="3">
                <span class="typo-val" id="cemetery-rows-val">3</span>
            </div>
            <div class="settings-row">
                <label id="cemetery-overflow-label">
                    <input type="checkbox" id="cemetery-overflow-check" checked>
                    <span id="cemetery-overflow-span">Overflow</span>
                </label>
                <label>
                    <span data-i18n="themeLabel"></span>
                    <select id="theme-select">
                        <option value="Showdown">Showdown</option>
                        <option value="Home">Home</option>
                        <option value="Official">Official</option>
                        <option value="Pixel">Pixel</option>
                    </select>
                </label>
            </div>

            <!-- Typography for overflow counter (shown when overflow is on) -->
            <div id="cem-typo-section" style="display:none; flex-direction:column; gap:10px;">
                <div class="typo-row">
                    <span class="typo-label" id="cem-typo-font-label">Fuente</span>
                    <div class="font-dropdown" id="cem-font-dropdown">
                        <div class="font-dropdown__trigger" id="cem-font-trigger" onclick="toggleCemFontDropdown()">
                            <span id="cem-font-selected-label">Anton</span>
                            <svg class="font-dropdown__caret" viewBox="0 0 10 6" width="10" height="6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                        </div>
                        <div class="font-dropdown__panel" id="cem-font-panel"></div>
                    </div>
                </div>
                <div class="typo-row">
                    <span class="typo-label" id="cem-typo-size-label">Tamaño</span>
                    <input type="range" id="cem-typo-size" min="20" max="80" value="56" oninput="onCemTypoSize(this.value)">
                    <span class="typo-val" id="cem-typo-size-val">56px</span>
                </div>
                <div class="typo-row typo-row--colors">
                    <span class="typo-label" id="cem-typo-text-label">Texto</span>
                    <div class="color-swatch" id="cem-text-swatch" onclick="openCemPicker('text')" style="background:#ffffff"></div>
                    <span class="typo-label typo-label--gap" id="cem-typo-stroke-label">Borde</span>
                    <div class="color-swatch" id="cem-stroke-swatch" onclick="openCemPicker('stroke')" style="background:#000000"></div>
                    <input type="range" id="cem-typo-stroke" min="0" max="10" value="0" step="0.5" oninput="onCemTypoStroke(this.value)">
                    <span class="typo-val" id="cem-typo-stroke-val">0px</span>
                </div>

                <div class="color-picker-popover hidden" id="cem-color-picker">
                    <canvas id="cem-cp-canvas" width="220" height="140"></canvas>
                    <div class="cp-thumb" id="cem-cp-thumb"></div>
                    <canvas id="cem-cp-hue" width="220" height="14"></canvas>
                    <div class="cp-hue-thumb" id="cem-cp-hue-thumb"></div>
                    <input type="text" class="cp-hex" id="cem-cp-hex" maxlength="7" spellcheck="false">
                </div>
            </div>
        </div>

        <!-- Publish / Reset -->
        <div class="card card--actions">
            <div class="actions">
                <p id="cemetery-obs-hint" class="obs-hint"></p>
                <button id="cemetery-publish-btn" class="btn-publish" onclick="publishCemetery()">📡 Publicar</button>
                <button id="cemetery-reset-btn" class="btn-reset" onclick="resetCemetery()">Resetear</button>
                <div id="cemetery-status"></div>
            </div>
        </div>

    </div><!-- /pokemon-actions-col -->
    </div><!-- /pokemon-bottom-cols -->

</div><!-- /pokemon-desktop-layout -->

</div>

<!-- Properties modal (same structure as index.html) -->
<div id="modal-backdrop">
    <div id="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-props"></div>
        <button class="modal-apply" onclick="applyModal()">Aplicar</button>
    </div>
</div>

<script src="badges.js"></script>
<script src="cemetery.js"></script>
<script>
function setLang(lang) {
    setLangBase(lang);
    document.documentElement.lang = lang;
    document.getElementById('lang-es').classList.toggle('active', lang === 'es');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    applyBadgeLang();
    applyCemeteryLang();
    applyHeaderLang();
}
setLang(currentLang);
</script>
</body>
</html>
