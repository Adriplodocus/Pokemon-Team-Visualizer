<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla de tipos — Pokémon Stream Visualizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='white'/><path d='M2,16 A14,14 0 0,1 30,16 Z' fill='%23EE1515'/><circle cx='16' cy='16' r='14' fill='none' stroke='%231a1a1a' stroke-width='2'/><line x1='2' y1='16' x2='30' y2='16' stroke='%231a1a1a' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='%231a1a1a'/><circle cx='16' cy='16' r='3' fill='white'/></svg>">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#00CCFF">
<script src="lang.js"></script>
</head>
<body>
<script>const ACTIVE_PAGE = 'types';</script>
<script src="patch-notes.js"></script>
<script src="header.js"></script>
<div id="app">

    <div class="card">
        <div class="pk-search-section">
            <div class="pk-ac-wrapper">
                <input id="pk-search-input" class="pk-search-input"
                       type="text" data-i18n-type-ph="pokemonSearchPh"
                       placeholder="Buscar Pokémon..."
                       autocomplete="off" spellcheck="false">
                <button id="pk-clear-btn" class="pk-clear-btn" style="display:none" aria-label="Clear">×</button>
                <ul id="pk-search-suggestions" class="suggestions pk-suggestions"></ul>
            </div>
            <div id="pk-props-row" class="pk-props-row" style="display:none">
                <button class="pk-props-btn" onclick="openTypesModal()" data-i18n-type="propsBtn">Propiedades</button>
            </div>
            <div id="pk-result" class="pk-result" style="display:none">
                <img id="pk-result-sprite" class="pk-result-sprite" src="" alt="" decoding="async">
                <div class="pk-result-col">
                    <div id="pk-result-types" class="pk-result-types"></div>
                    <div id="pk-info-badge"></div>
                    <div id="pk-info-abilities"></div>
                </div>
                <div class="pk-result-col">
                    <div id="pk-info-stats"></div>
                </div>
            </div>
            <p id="pk-error" class="pk-error" style="display:none"></p>
            <div id="pk-info" class="pk-info" style="display:none">
                <div id="pk-info-evo"></div>
            </div>
        </div>
        <div class="types-layout">
            <div class="types-selector">
                <p class="types-selector-hint" data-i18n-type="selectorHint">Elige el tipo del que quieres ver las debilidades.</p>
                <div id="type-grid" class="type-grid"></div>
                <button class="btn-reset" onclick="resetTypes()" data-i18n-type="resetBtn">Resetear</button>
            </div>
            <div id="types-table" class="types-table-panel"></div>
        </div>
    </div>


</div>

<div id="modal-backdrop">
    <div id="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-props"></div>
        <button class="modal-apply" onclick="applyTypesModal()" data-i18n-type="modalSet">Guardar</button>
    </div>
</div>

<script src="pokemon-catalog.js?v=3"></script>
<script src="badges.js?v=2"></script>
<script src="types.js?v=2"></script>
<script>
function setLang(lang) {
    setLangBase(lang);
    document.documentElement.lang = lang;
    document.getElementById('lang-es').classList.toggle('active', lang === 'es');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    applyBadgeLang();
    applyTypeLang();
    applyHeaderLang();
}
TYPES.forEach(t => TYPE_ICON_COLORS[t] = TYPE_COLORS[t]);
setLang(currentLang);
initPkSearch();
Promise.all(TYPES.map(t => sampleIconColor(t))).then(() => renderTypeSelector());
</script>
</body>
</html>
