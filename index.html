<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Team Visualizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='white'/><path d='M2,16 A14,14 0 0,1 30,16 Z' fill='%23EE1515'/><circle cx='16' cy='16' r='14' fill='none' stroke='%231a1a1a' stroke-width='2'/><line x1='2' y1='16' x2='30' y2='16' stroke='%231a1a1a' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='%231a1a1a'/><circle cx='16' cy='16' r='3' fill='white'/></svg>">
<link rel="stylesheet" href="style.css">
<script src="pokemon-catalog.js"></script>
</head>
<body>
<header>
    <div class="header-title-row">
        <a href="https://mrklypp.com/" target="_blank" rel="noopener" class="avatar-ring">
            <img src="https://mrklypp.com/assets/img/logo.png" alt="MrKlypp">
        </a>
        <h1>Pokémon Team Visualizer</h1>
    </div>
    <p class="subtitle" data-i18n="subtitle1"></p>
    <p class="subtitle" data-i18n="subtitle2"></p>
    <p class="warn" data-i18n="warn"></p>
    <button class="btn-import-header" onclick="document.getElementById('import-input').click()" data-i18n="importBtn"></button>
    <input type="file" id="import-input" accept=".html" style="display:none" onchange="importTeam(this)">
    <div class="lang-toggle">
        <button id="lang-es" onclick="setLang('es')">ES</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>
</header>
<div id="app">

    <!-- Team -->
    <div class="card card--team">
        <div id="team-rows"></div>
    </div>

    <!-- Settings -->
    <div class="card">
        <div class="settings-row">
            <label>
                <span data-i18n="layout"></span>
                <select id="layout-select">
                    <option value="horizontal" data-i18n="horizontal"></option>
                    <option value="vertical" data-i18n="vertical"></option>
                </select>
            </label>
            <label><input type="checkbox" id="shadows-check" checked> <span data-i18n="showShadows"></span></label>
            <label><input type="checkbox" id="bg-check" checked> <span data-i18n="showBg"></span></label>
        </div>
    </div>

    <!-- Live preview -->
    <div class="card card--preview" id="preview-card" style="display:none">
        <p id="preview-msg" style="display:none"></p>
        <div id="preview-wrapper">
            <iframe id="preview-iframe" scrolling="no" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Actions -->
    <div class="card card--actions">
        <div class="actions">
            <p id="obs-hint" class="obs-hint"></p>
            <button class="btn-generate" onclick="generateAndDownload()" data-i18n="generateBtn"></button>
            <button class="btn-live-preview" id="btn-live-preview" onclick="togglePreview()"></button>
            <button class="btn-reset" onclick="resetAll()" data-i18n="resetBtn"></button>
            <div id="status"></div>
        </div>
    </div>

    <!-- Social -->
    <div class="card social">
        <p data-i18n="madeBy"></p>
        <a href="https://paypal.me/MrKlypp" target="_blank" rel="noopener" class="donate-btn">💜 Donar</a>
        <div class="social-links">
            <a href="https://mrklypp.com" target="_blank">Home</a>
            <a href="https://www.twitch.tv/MrKlypp" target="_blank">Twitch</a>
            <a href="https://www.youtube.com/@MrKlypp" target="_blank">YouTube</a>
            <a href="https://www.instagram.com/MrKlypp_/" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@mrklypp" target="_blank">TikTok</a>
            <a href="https://x.com/MrKlypp" target="_blank">X</a>
        </div>
    </div>
</div>

<!-- Properties modal -->
<div id="modal-backdrop">
    <div id="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-props"></div>
        <button class="modal-apply" onclick="applyModal()" data-i18n="modalSet"></button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
