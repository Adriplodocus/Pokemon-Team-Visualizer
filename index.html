<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Team Visualizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='white'/><path d='M2,16 A14,14 0 0,1 30,16 Z' fill='%23EE1515'/><circle cx='16' cy='16' r='14' fill='none' stroke='%231a1a1a' stroke-width='2'/><line x1='2' y1='16' x2='30' y2='16' stroke='%231a1a1a' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='%231a1a1a'/><circle cx='16' cy='16' r='3' fill='white'/></svg>">
<script src="pokemon-catalog.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Russo+One&display=swap');

:root {
    --bg:          #1a1a1a;
    --surface:     #252525;
    --surface-2:   #2d2d2d;
    --border:      rgba(255,255,255,0.07);
    --border-focus: #FF56B4;
    --input-bg:    #2d2d2d;
    --btn:         #2d2d2d;
    --btn-hover:   #383838;
    --text:        #f0f0f0;
    --text-2:      #9a9a9a;
    --accent:      #FF56B4;
    --cyan:        #00CCFF;
    --error:       #f87171;
    --success:     #4ade80;
    --reset:       #3f1111;
    --reset-hover: #5c1f1f;
    --dimmed:      #555;
    --gold:        #fbbf24;
    --male-blue:   #60a5fa;
    --radius:      14px;
    --radius-sm:   8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

@keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
}

body {
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('https://mrklypp.com/assets/background.png') repeat center top / auto;
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Syne', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
}

/* ── Header ─────────────────────────────────────────────────── */
header { text-align: center; margin-bottom: 24px; animation: fade-up 0.5s ease both; }
.header-title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 6px;
}
h1 { font-family: 'Russo One', sans-serif; font-size: 28px; font-weight: normal; letter-spacing: 0.02em; color: var(--cyan); }

@keyframes avatar-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(0,204,255,0);    border-color: rgba(0,204,255,0.4); }
    25%  { box-shadow: 0 0 0 10px rgba(0,204,255,0.2); border-color: rgba(0,204,255,0.7); }
    50%  { box-shadow: 0 0 0 0   rgba(255,86,180,0);   border-color: rgba(255,86,180,0.4); }
    75%  { box-shadow: 0 0 0 10px rgba(255,86,180,0.2);border-color: rgba(255,86,180,0.7); }
    100% { box-shadow: 0 0 0 0   rgba(0,204,255,0);    border-color: rgba(0,204,255,0.4); }
}
.avatar-ring {
    flex-shrink: 0;
    border-radius: 50%;
    width: 52px; height: 52px;
    border: 2px solid rgba(0,204,255,0.4);
    animation: avatar-pulse 4s ease-in-out infinite;
    transition: transform 0.2s;
    display: flex; align-items: center; justify-content: center;
    overflow: visible;
}
.avatar-ring:hover { transform: scale(1.06); }
.avatar-ring img {
    width: 66px; height: 66px;
    border-radius: 50%; object-fit: cover; display: block;
}
.subtitle { color: var(--text-2); font-size: 13px; margin-bottom: 4px; }
.warn { color: var(--error); font-size: 12px; margin-top: 4px; }

/* ── Lang toggle ─────────────────────────────────────────────── */
.lang-toggle {
    display: inline-flex;
    gap: 2px;
    margin-top: 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
}
.lang-toggle button {
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text-2);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
}
.lang-toggle button.active { background: var(--btn-hover); color: var(--text); }

#app { width: 100%; max-width: 680px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    animation: fade-up 0.5s ease both;
}
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.20s; }
.card.card--team    { border-left: 3px solid var(--accent); }
.card.card--actions { border-left: 3px solid var(--cyan); }

/* ── Pokémon rows ─────────────────────────────────────────────── */
.pokemon-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    transition: outline 0.1s;
}
.pokemon-row:last-child { border-bottom: none; }
.pokemon-row.dragging  { opacity: 0.35; }
.pokemon-row.drag-over { outline: 1px solid rgba(0,204,255,0.45); border-radius: 6px; }

/* Drag handle */
.drag-handle {
    flex-shrink: 0;
    cursor: grab;
    color: var(--dimmed);
    font-size: 15px;
    line-height: 1;
    padding: 0 2px;
    user-select: none;
    transition: color 0.15s;
}
.drag-handle:hover { color: var(--text-2); }
.drag-handle:active { cursor: grabbing; }

/* Sprite preview */
.sprite-preview {
    flex: 0 0 48px;
    width: 48px;
    height: 48px;
    object-fit: contain;
    display: block;
    opacity: 0;
    transition: opacity 0.2s;
}
.sprite-preview.visible { opacity: 1; }

.row-label { min-width: 76px; font-size: 13px; color: var(--text-2); font-weight: 500; white-space: nowrap; }

/* Autocomplete */
.ac-wrapper { position: relative; flex: 0 0 162px; }
.name-input, .mote-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
}
.name-input:focus, .mote-input:focus { border-color: var(--border-focus); }
.mote-input { flex: 0 0 120px; }
.suggestions {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    list-style: none;
    z-index: 100;
    display: none;
    max-height: 200px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.suggestions li { padding: 7px 12px; cursor: pointer; font-size: 13px; }
.suggestions li:hover, .suggestions li.active { background: var(--btn-hover); }

/* Property icons */
.icons { display: flex; gap: 6px; }
.icon { font-size: 15px; cursor: default; user-select: none; transition: color 0.15s; }
.icon.dimmed { color: var(--dimmed); }
.gender-icon { color: var(--male-blue); }
.gender-icon.female { color: var(--accent); }
.skin-icon.active { color: var(--accent); }
.shiny-icon.active { color: var(--gold); }

/* Buttons */
button {
    background: var(--btn);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    transition: background 0.15s;
    white-space: nowrap;
}
button:hover { background: var(--btn-hover); }
.props-btn { flex: 0 0 80px; font-size: 12px; }
.clear-btn  { flex: 0 0 30px; background: var(--reset); border-color: transparent; padding: 6px 0; }
.clear-btn:hover { background: var(--reset-hover); }

/* ── Settings ─────────────────────────────────────────────────── */
.settings-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
}
.settings-row label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
}
select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
}
input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

/* ── Actions ──────────────────────────────────────────────────── */
.actions { display: flex; flex-direction: column; gap: 8px; }

.obs-hint {
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.6;
    padding: 10px 14px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--accent);
}
.obs-hint strong { color: var(--text); font-weight: 600; }

.btn-generate {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-weight: 700;
    background: var(--cyan);
    border-color: transparent;
    border-radius: 50px;
    color: #000;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'Russo One', sans-serif;
}
.btn-generate:hover { background: #00b8e6; }

.btn-preview { width: 100%; padding: 9px; }
.btn-import-header {
    margin-top: 12px;
    padding: 7px 18px;
    font-size: 13px;
    background: var(--btn);
    border-color: var(--border);
}

.btn-reset {
    width: 100%;
    padding: 9px;
    background: var(--reset);
    border-color: transparent;
    color: #fca5a5;
}
.btn-reset:hover { background: var(--reset-hover); }

#status { text-align: center; min-height: 20px; font-size: 13px; margin-top: 2px; }

/* ── Social ───────────────────────────────────────────────────── */
.social { text-align: center; }
.social p { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 12px; }
.social-links { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.social a {
    display: inline-block;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--cyan);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    transition: background 0.15s, border-color 0.15s;
}
.social a:hover { background: var(--btn-hover); border-color: var(--cyan); }

/* ── Modal ────────────────────────────────────────────────────── */
#modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    justify-content: center;
    align-items: center;
}
#modal-backdrop.open { display: flex; }
#modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    min-width: 300px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}
#modal h3 { text-align: center; margin-bottom: 20px; font-size: 15px; font-weight: 600; }
.modal-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.modal-row label { font-size: 13px; color: var(--text-2); font-weight: 500; min-width: 60px; }
.modal-row select { width: 170px; }
.modal-apply {
    display: block;
    margin: 20px auto 0;
    width: 130px;
    padding: 8px;
    font-size: 14px;
    font-weight: 600;
    background: var(--accent);
    border-color: transparent;
    color: #fff;
}
.modal-apply:hover { background: #e04aa0; }
</style>
</head>
<body>
<header>
    <div class="header-title-row">
        <div class="avatar-ring">
            <img src="https://mrklypp.com/assets/img/logo.png" alt="MrKlypp">
        </div>
        <h1>Pokémon Team Visualizer</h1>
    </div>
    <p class="subtitle" data-i18n="subtitle1"></p>
    <p class="subtitle" data-i18n="subtitle2"></p>
    <p class="warn" data-i18n="warn"></p>
    <button class="btn-import-header" onclick="document.getElementById('import-input').click()" data-i18n="importBtn"></button>
    <input type="file" id="import-input" accept=".html" style="display:none" onchange="importTeam(this)">
    <div class="lang-toggle">
        <button id="lang-es" onclick="setLang('es')">ES</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>
</header>
<div id="app">

    <!-- Team -->
    <div class="card card--team">
        <div id="team-rows"></div>
    </div>

    <!-- Settings -->
    <div class="card">
        <div class="settings-row">
            <label>
                <span data-i18n="layout"></span>
                <select id="layout-select">
                    <option value="horizontal" data-i18n="horizontal"></option>
                    <option value="vertical" data-i18n="vertical"></option>
                </select>
            </label>
            <label><input type="checkbox" id="shadows-check" checked> <span data-i18n="showShadows"></span></label>
            <label><input type="checkbox" id="bg-check" checked> <span data-i18n="showBg"></span></label>
        </div>
    </div>

    <!-- Actions -->
    <div class="card card--actions">
        <div class="actions">
            <p id="obs-hint" class="obs-hint"></p>
            <button class="btn-generate" onclick="generateAndDownload()" data-i18n="generateBtn"></button>
            <button class="btn-preview" onclick="previewOverlay()" data-i18n="previewBtn"></button>
            <button class="btn-reset" onclick="resetAll()" data-i18n="resetBtn"></button>
            <div id="status"></div>
        </div>
    </div>

    <!-- Social -->
    <div class="card social">
        <p data-i18n="madeBy"></p>
        <div class="social-links">
            <a href="https://mrklypp.com" target="_blank">Home</a>
            <a href="https://www.twitch.tv/MrKlypp" target="_blank">Twitch</a>
            <a href="https://www.youtube.com/@MrKlypp" target="_blank">YouTube</a>
            <a href="https://www.instagram.com/MrKlypp_/" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@mrklypp" target="_blank">TikTok</a>
            <a href="https://x.com/MrKlypp" target="_blank">X</a>
        </div>
    </div>
</div>

<!-- Properties modal -->
<div id="modal-backdrop">
    <div id="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-props"></div>
        <button class="modal-apply" onclick="applyModal()" data-i18n="modalSet"></button>
    </div>
</div>

<script>
// ── i18n ────────────────────────────────────────────────────────
const STRINGS = {
    es: {
        subtitle1:     'Genera tu overlay de equipo Pokémon para OBS en segundos.',
        subtitle2:     'Escribe los nombres exactamente como aparecen en el juego.',
        warn:          'Si encuentras algún error, por favor házmelo saber.',
        importBtn:     '⬆ Importar equipo',
        layout:        'Diseño',
        horizontal:    'Horizontal',
        vertical:      'Vertical',
        showShadows:   'Mostrar sombras',
        showBg:        'Mostrar fondo de pokéball',
        generateBtn:   '⬇ Generar y descargar',
        previewBtn:    'Vista previa en el navegador',
        resetBtn:      'Resetear datos',
        madeBy:        'Hecho por @MrKlypp',
        modalSet:      'Aplicar',
        modalTitle:    'propiedades',
        modalGender:   'Género',
        modalSkin:     'Skin',
        modalShiny:    'Shiny',
        namePh:        'Nombre...',
        notePh:        'Mote...',
        propsBtn:      'Propiedades',
        errNoName:     'Escribe al menos un nombre de Pokémon.',
        errUnknown:    n => `Pokémon desconocido: ${n}`,
        errWriteFirst: 'Escribe primero un nombre de Pokémon.',
        errNoData:     'No se encontraron datos en este archivo.',
        errRead:       'Error al leer el archivo.',
        successReset:  'Datos reseteados correctamente.',
        successDl:     '¡TeamVisualizer.html descargado!',
        successImport: '¡Equipo importado correctamente!',
        obsHint:       dims => `Añade un <strong>Browser Source</strong> en OBS y selecciona <strong>TeamVisualizer.html</strong> como archivo local.<br>Tamaño recomendado: <strong>${dims}</strong><br>Puedes reemplazar el archivo directamente.`,
    },
    en: {
        subtitle1:     'Generate your Pokémon team overlay for OBS in seconds.',
        subtitle2:     'Write Pokémon names exactly as they appear in-game.',
        warn:          'If you encounter any error, please let me know.',
        importBtn:     '⬆ Import team',
        layout:        'Layout',
        horizontal:    'Horizontal',
        vertical:      'Vertical',
        showShadows:   'Show shadows',
        showBg:        'Show pokéball background',
        generateBtn:   '⬇ Generate & Download',
        previewBtn:    'Preview in browser',
        resetBtn:      'Reset all data',
        madeBy:        'Made by @MrKlypp',
        modalSet:      'Set',
        modalTitle:    'properties',
        modalGender:   'Gender',
        modalSkin:     'Skin',
        modalShiny:    'Shiny',
        namePh:        'Name...',
        notePh:        'Nickname...',
        propsBtn:      'Properties',
        errNoName:     'Write at least one Pokémon name.',
        errUnknown:    n => `Unknown Pokémon: ${n}`,
        errWriteFirst: 'Write a Pokémon name first.',
        errNoData:     'No team data found in this file.',
        errRead:       'Error reading file.',
        successReset:  'Team data was reset successfully.',
        successDl:     'TeamVisualizer.html downloaded!',
        successImport: 'Team imported successfully!',
        obsHint:       dims => `Add a <strong>Browser Source</strong> in OBS and select <strong>TeamVisualizer.html</strong> as a local file.<br>Recommended size: <strong>${dims}</strong><br>You can replace the file directly.`,
    }
};

let currentLang = localStorage.getItem('ptv_lang') || 'es';

function t(key, arg) {
    const val = STRINGS[currentLang][key];
    return typeof val === 'function' ? val(arg) : val;
}

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('ptv_lang', lang);
    document.documentElement.lang = lang;
    document.getElementById('lang-es').classList.toggle('active', lang === 'es');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    applyLang();
}

function applyLang() {
    const s = STRINGS[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (typeof s[key] === 'string') el.textContent = s[key];
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.dataset.i18nPh;
        if (typeof s[key] === 'string') el.placeholder = s[key];
    });
    updateObsHint();
}

// ── Constants ───────────────────────────────────────────────────
const BASE_URL     = 'https://pokemonteamvisualizer.pages.dev/Python/Resources/AnimatedSprites/';
const SHADOW_URL   = 'https://i.postimg.cc/xdmpF4Tm/Shadow.png';
const POKEBALL_URL = 'https://i.postimg.cc/0QdW9KS2/Pokeball-Background.png';

// ── State ───────────────────────────────────────────────────────
const DEFAULT_PROPS = { gender: 'male', skin: 'common', shiny: 'False' };

const team = Array.from({ length: 6 }, () => ({
    name: '',
    mote: '',
    properties: { ...DEFAULT_PROPS }
}));

let pokemonNames = [];
let modalIndex   = -1;
let modalVars    = {};
let dragSrcIndex = -1;

// ── Load autocomplete list ──────────────────────────────────────
fetch('pokemon-list.json')
    .then(r => r.json())
    .then(names => {
        pokemonNames = names;
        for (let i = 0; i < 6; i++) refreshSprite(i);
    })
    .catch(() => {});

// ── Build UI rows ───────────────────────────────────────────────
function buildRows() {
    const container = document.getElementById('team-rows');
    container.innerHTML = '';
    for (let i = 0; i < 6; i++) {
        const row = document.createElement('div');
        row.className = 'pokemon-row';
        row.dataset.index = i;
        row.innerHTML = `
            <span class="drag-handle" title="Drag to reorder">⠿</span>
            <img class="sprite-preview" src="" alt="">
            <span class="row-label">Pokémon ${i + 1}:</span>
            <div class="ac-wrapper">
                <input class="name-input" type="text" data-i18n-ph="namePh" autocomplete="off" spellcheck="false">
                <ul class="suggestions"></ul>
            </div>
            <input class="mote-input" type="text" data-i18n-ph="notePh">
            <div class="icons">
                <span class="icon gender-icon" title="Gender">♂</span>
                <span class="icon skin-icon dimmed" title="Skin">◆</span>
                <span class="icon shiny-icon dimmed" title="Shiny">★</span>
            </div>
            <button class="props-btn" data-i18n="propsBtn" onclick="openModal(${i})"></button>
            <button class="clear-btn" onclick="clearSlot(${i})">✕</button>
        `;
        container.appendChild(row);

        const nameInput   = row.querySelector('.name-input');
        const moteInput   = row.querySelector('.mote-input');
        const suggestions = row.querySelector('.suggestions');

        nameInput.addEventListener('input', () => {
            team[i].name = nameInput.value;
            team[i].properties = { ...DEFAULT_PROPS };
            updateSuggestions(nameInput, suggestions, i);
            refreshIcons(i);
            refreshSprite(i);
            saveState();
        });
        nameInput.addEventListener('keydown', e => {
            if (e.key === 'Tab' && suggestions.style.display === 'block') {
                e.preventDefault();
                const first = suggestions.querySelector('li');
                if (first) {
                    nameInput.value = first.dataset.value;
                    team[i].name = first.dataset.value;
                    refreshSprite(i);
                    saveState();
                }
                closeSuggestions(suggestions);
            } else if (e.key === 'Enter') {
                refreshSprite(i);
                saveState();
                closeSuggestions(suggestions);
            } else if (e.key === 'ArrowDown') navigateSuggestions(suggestions, 1);
            else if (e.key === 'ArrowUp')   navigateSuggestions(suggestions, -1);
        });
        moteInput.addEventListener('input', () => { team[i].mote = moteInput.value; saveState(); });

        suggestions.addEventListener('click', e => {
            const li = e.target.closest('li');
            if (!li) return;
            nameInput.value = li.dataset.value;
            team[i].name = li.dataset.value;
            closeSuggestions(suggestions);
            refreshSprite(i);
            saveState();
        });

        // ── Drag & drop ─────────────────────────────────────────
        const handle = row.querySelector('.drag-handle');
        handle.draggable = true;

        handle.addEventListener('dragstart', e => {
            dragSrcIndex = i;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(i));
            e.dataTransfer.setDragImage(row, 20, row.offsetHeight / 2);
            setTimeout(() => row.classList.add('dragging'), 0);
        });
        handle.addEventListener('dragend', () => {
            dragSrcIndex = -1;
            row.classList.remove('dragging');
            document.querySelectorAll('.pokemon-row').forEach(r => r.classList.remove('drag-over'));
        });
        row.addEventListener('dragover', e => {
            e.preventDefault();
            if (dragSrcIndex !== i) row.classList.add('drag-over');
        });
        row.addEventListener('dragleave', e => {
            if (!row.contains(e.relatedTarget)) row.classList.remove('drag-over');
        });
        row.addEventListener('drop', e => {
            e.preventDefault();
            row.classList.remove('drag-over');
            const src = dragSrcIndex;
            if (src < 0 || src === i) return;
            const [item] = team.splice(src, 1);
            team.splice(i, 0, item);
            for (let k = 0; k < 6; k++) refreshRow(k);
            saveState();
        });
    }

    document.addEventListener('click', e => {
        document.querySelectorAll('.suggestions').forEach(s => {
            if (!s.closest('.ac-wrapper').contains(e.target)) closeSuggestions(s);
        });
    });
}

function updateSuggestions(input, list, idx) {
    const typed = input.value.toLowerCase();
    if (typed.length < 2) { closeSuggestions(list); return; }
    const matches = pokemonNames.filter(n => n.startsWith(typed)).slice(0, 8);
    if (!matches.length) { closeSuggestions(list); return; }
    list.innerHTML = matches.map(n => `<li data-value="${n}">${n}</li>`).join('');
    list.style.display = 'block';
}

function closeSuggestions(list) { list.innerHTML = ''; list.style.display = 'none'; }

function navigateSuggestions(list, dir) {
    const items = list.querySelectorAll('li');
    if (!items.length) return;
    const active = list.querySelector('li.active');
    let idx = active ? [...items].indexOf(active) + dir : (dir > 0 ? 0 : items.length - 1);
    idx = Math.max(0, Math.min(items.length - 1, idx));
    items.forEach(li => li.classList.remove('active'));
    items[idx].classList.add('active');
    const row = list.closest('.pokemon-row');
    const input = row.querySelector('.name-input');
    const rowIndex = parseInt(row.dataset.index);
    input.value = items[idx].dataset.value;
    team[rowIndex].name = input.value;
    refreshSprite(rowIndex);
}

// ── Icons ───────────────────────────────────────────────────────
function refreshIcons(i) {
    const row = document.querySelector(`.pokemon-row[data-index="${i}"]`);
    const p   = team[i].properties;

    const gIcon = row.querySelector('.gender-icon');
    gIcon.textContent = p.gender === 'female' ? '♀' : '♂';
    gIcon.className = 'icon gender-icon' + (p.gender === 'female' ? ' female' : '');

    row.querySelector('.skin-icon').className  = 'icon skin-icon'  + (p.skin  !== 'common' ? ' active' : ' dimmed');
    row.querySelector('.shiny-icon').className = 'icon shiny-icon' + (p.shiny === 'True'   ? ' active' : ' dimmed');
}

// ── Sprite preview ──────────────────────────────────────────────
function refreshSprite(i) {
    const row  = document.querySelector(`.pokemon-row[data-index="${i}"]`);
    const img  = row.querySelector('.sprite-preview');
    const name = team[i].name.trim().toLowerCase();
    if (name && pokemonNames.includes(name)) {
        const url         = buildSpriteUrl(name, team[i].properties);
        const fallbackUrl = BASE_URL + encodeURIComponent(name) + '.gif';
        img.onerror = () => {
            if (img.src !== fallbackUrl) {
                img.src = fallbackUrl;
            } else {
                img.classList.remove('visible');
                img.onerror = null;
            }
        };
        img.src = url;
        img.classList.add('visible');
    } else {
        img.onerror = null;
        img.classList.remove('visible');
        img.src = '';
    }
}

// ── Refresh full row ─────────────────────────────────────────────
function refreshRow(i) {
    const row = document.querySelector(`.pokemon-row[data-index="${i}"]`);
    row.querySelector('.name-input').value = team[i].name;
    row.querySelector('.mote-input').value = team[i].mote;
    refreshIcons(i);
    refreshSprite(i);
}

// ── Clear slot ──────────────────────────────────────────────────
function clearSlot(i) {
    team[i] = { name: '', mote: '', properties: { ...DEFAULT_PROPS } };
    const row = document.querySelector(`.pokemon-row[data-index="${i}"]`);
    row.querySelector('.name-input').value = '';
    row.querySelector('.mote-input').value = '';
    refreshIcons(i);
    refreshSprite(i);
}

// ── Reset all ───────────────────────────────────────────────────
function resetAll() {
    for (let i = 0; i < 6; i++) clearSlot(i);
    saveState();
    setStatus(t('successReset'), 'var(--success)');
}

// ── Properties modal ────────────────────────────────────────────
function openModal(i) {
    modalIndex = i;
    const name = team[i].name.trim();
    if (!name) {
        setStatus(t('errWriteFirst'), 'var(--error)');
        return;
    }
    document.getElementById('modal-title').textContent = capitalize(name) + ' ' + t('modalTitle');

    const catalog = POKEMON_CATALOG[name.toLowerCase()] || {};
    const skins   = ['common', ...(catalog.skin || [])];
    const props   = team[i].properties;
    modalVars = {};

    const propsEl = document.getElementById('modal-props');
    propsEl.innerHTML = '';

    modalVars.gender = props.gender;
    propsEl.innerHTML += `
        <div class="modal-row">
            <label>${t('modalGender')}</label>
            <select id="mp-gender" onchange="modalVars.gender=this.value">
                <option value="male"   ${props.gender==='male'   ? 'selected':''}>male</option>
                <option value="female" ${props.gender==='female' ? 'selected':''}>female</option>
            </select>
        </div>`;

    modalVars.skin = props.skin;
    propsEl.innerHTML += `
        <div class="modal-row">
            <label>${t('modalSkin')}</label>
            <select id="mp-skin" onchange="modalVars.skin=this.value">
                ${skins.map(s => `<option value="${s}" ${props.skin===s?'selected':''}>${s}</option>`).join('')}
            </select>
        </div>`;

    modalVars.shiny = props.shiny;
    propsEl.innerHTML += `
        <div class="modal-row">
            <label>${t('modalShiny')}</label>
            <select id="mp-shiny" onchange="modalVars.shiny=this.value">
                <option value="False" ${props.shiny==='False'?'selected':''}>False</option>
                <option value="True"  ${props.shiny==='True' ?'selected':''}>True</option>
            </select>
        </div>`;

    document.getElementById('modal-backdrop').classList.add('open');
}

function applyModal() {
    if (modalIndex < 0) return;
    team[modalIndex].properties = { ...modalVars };
    refreshIcons(modalIndex);
    refreshSprite(modalIndex);
    saveState();
    closeModal();
}

function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    modalIndex = -1;
}

document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

// ── Sprite URL builder ──────────────────────────────────────────
function buildSpriteUrl(name, props) {
    const lower  = name.toLowerCase();
    const shiny  = props.shiny === 'True';
    const skin   = props.skin  || 'common';
    const gender = props.gender|| 'male';

    const catalog = POKEMON_CATALOG[lower] || {};
    const skins   = catalog.skin || [];

    let fileName = lower;
    let folder   = BASE_URL;

    if (shiny) {
        if (skin !== 'common' && skins.includes(skin)) fileName += '-' + skin;
        if (gender === 'female') fileName += '-f';
        fileName += ' (1)';
        folder += 'Shiny/';
    } else if (skin !== 'common' && skins.includes(skin)) {
        fileName += '-' + skin;
    } else if (gender === 'female') {
        fileName += '-f';
    }

    return folder + encodeURIComponent(fileName) + '.gif';
}

// ── Generate HTML ───────────────────────────────────────────────

    if (isHorizontal) {
        return `<html>

.shadowDiv{width:225px;height:150px;float:left;padding-top:80px;}
img{width:100%;max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;user-select:none;}
p{height:25px;color:white;text-align:center;font-family:Anton,'Arial Narrow Bold',sans-serif;font-size:35px;text-shadow:3px 3px 0 #000,-3px 3px 0 #000,-3px -3px 0 #000,3px -3px 0 #000;}

.pkDiv:nth-child(4),.shadowDiv:nth-child(4){animation-delay:0.36s;}
.pkDiv:nth-child(5),.shadowDiv:nth-child(5){animation-delay:0.48s;}

    } else {
        return `<html>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

.shadowDiv{width:150px;margin-top:-15px;}
#pokeballBackground1,#pokeballBackground2,#pokeballBackground3,#pokeballBackground4,#pokeballBackground5,#pokeballBackground6{position:absolute;width:225px;height:150px;z-index:-1;}

.pair:nth-child(1){animation-delay:0.00s;}
.pair:nth-child(2){animation-delay:0.12s;}

// ── Validation ──────────────────────────────────────────────────
function validateTeam() {
    const invalid = team
        .filter(s => s.name.trim())
        .filter(s => !pokemonNames.includes(s.name.trim().toLowerCase()));
    if (invalid.length) {
        setStatus(t('errUnknown', invalid.map(s => s.name).join(', ')), 'var(--error)');
        return false;
    }
    return true;
}

// ── Download ────────────────────────────────────────────────────
function generateAndDownload() {
    const hasAny = team.some(s => s.name.trim());
    if (!hasAny) { setStatus(t('errNoName'), 'var(--error)'); return; }
    if (!validateTeam()) return;

    const html = buildOverlayHTML(
        document.getElementById('layout-select').value,
        document.getElementById('shadows-check').checked,
        document.getElementById('bg-check').checked
    );
    triggerDownload(html, 'TeamVisualizer.html');
    setStatus(t('successDl'), 'var(--success)');
}

function previewOverlay() {
    const hasAny = team.some(s => s.name.trim());
    if (!hasAny) { setStatus(t('errNoName'), 'var(--error)'); return; }
    if (!validateTeam()) return;

    const html = buildOverlayHTML(
        document.getElementById('layout-select').value,
        document.getElementById('shadows-check').checked,
        document.getElementById('bg-check').checked
    );
    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    window.open(url, '_blank');
}

function triggerDownload(content, filename) {
    const blob = new Blob([content], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

// ── Import ───────────────────────────────────────────────────────
function importTeam(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const match = e.target.result.match(/<script type="application\/json" id="ptv-data">([\s\S]*?)<\/script>/);
        if (!match) { setStatus(t('errNoData'), 'var(--error)'); return; }
        try {
            const data = JSON.parse(match[1]);
            data.team.forEach((slot, i) => {
                if (i >= 6) return;
                team[i] = { name: slot.name || '', mote: slot.mote || '', properties: { ...DEFAULT_PROPS, ...(slot.properties || {}) } };
                const row = document.querySelector(`.pokemon-row[data-index="${i}"]`);
                row.querySelector('.name-input').value = team[i].name;
                row.querySelector('.mote-input').value = team[i].mote;
                refreshIcons(i);
                refreshSprite(i);
            });
            if (data.layout)               document.getElementById('layout-select').value   = data.layout;
            if (data.shadows !== undefined) document.getElementById('shadows-check').checked = data.shadows;
            if (data.bg      !== undefined) document.getElementById('bg-check').checked      = data.bg;
            updateObsHint();
            saveState();
            setStatus(t('successImport'), 'var(--success)');
        } catch(_) { setStatus(t('errRead'), 'var(--error)'); }
        input.value = '';
    };
    reader.readAsText(file);
}

// ── Persistence ─────────────────────────────────────────────────
function saveState() {
    localStorage.setItem('ptv_team',    JSON.stringify(team));
    localStorage.setItem('ptv_layout',  document.getElementById('layout-select').value);
    localStorage.setItem('ptv_shadows', document.getElementById('shadows-check').checked);
    localStorage.setItem('ptv_bg',      document.getElementById('bg-check').checked);
}

function loadState() {
    const saved = localStorage.getItem('ptv_team');
    if (!saved) return;
    try {
        const data = JSON.parse(saved);
        data.forEach((slot, i) => {
            if (i >= 6) return;
            team[i] = { name: slot.name || '', mote: slot.mote || '', properties: { ...DEFAULT_PROPS, ...(slot.properties || {}) } };
            const row = document.querySelector(`.pokemon-row[data-index="${i}"]`);
            row.querySelector('.name-input').value = team[i].name;
            row.querySelector('.mote-input').value = team[i].mote;
            refreshIcons(i);
            refreshSprite(i);
        });
    } catch(e) {}

    const layout = localStorage.getItem('ptv_layout');
    if (layout) document.getElementById('layout-select').value = layout;

    const shadows = localStorage.getItem('ptv_shadows');
    if (shadows !== null) document.getElementById('shadows-check').checked = shadows === 'true';

    const bg = localStorage.getItem('ptv_bg');
    if (bg !== null) document.getElementById('bg-check').checked = bg === 'true';
}

// ── Helpers ─────────────────────────────────────────────────────
function setStatus(msg, color) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.style.color = color;
    setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── OBS hint ────────────────────────────────────────────────────
function updateObsHint() {
    const layout = document.getElementById('layout-select').value;
    const dims   = layout === 'horizontal' ? '1350x265' : '265x1350';
    document.getElementById('obs-hint').innerHTML = t('obsHint', dims);
}

document.getElementById('layout-select').addEventListener('change', () => { saveState(); updateObsHint(); });
document.getElementById('shadows-check').addEventListener('change', saveState);
document.getElementById('bg-check').addEventListener('change', saveState);

// ── Init ─────────────────────────────────────────────────────────
buildRows();
loadState();
setLang(currentLang);
</script>
