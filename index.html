<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Stream Visualizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='white'/><path d='M2,16 A14,14 0 0,1 30,16 Z' fill='%23EE1515'/><circle cx='16' cy='16' r='14' fill='none' stroke='%231a1a1a' stroke-width='2'/><line x1='2' y1='16' x2='30' y2='16' stroke='%231a1a1a' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='%231a1a1a'/><circle cx='16' cy='16' r='3' fill='white'/></svg>">
<link rel="stylesheet" href="style.css">
<link id="gf-batch" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Alfa+Slab+One&family=Anton&family=Bangers&family=Bebas+Neue&family=Black+Han+Sans&family=Black+Ops+One&family=Boogaloo&family=Carter+One&family=Changa+One&family=Chewy&family=Cinzel&family=Concert+One&family=Creepster&family=Exo+2:wght@700&family=Fascinate&family=Fredoka+One&family=Fugaz+One&family=Graduate&family=Gugi&family=Josefin+Sans:wght@700&family=Knewave&family=Lilita+One&family=Lobster&family=Luckiest+Guy&family=Montserrat:wght@700&family=Nunito:wght@700&family=Orbitron:wght@700&family=Oswald:wght@700&family=Oxanium:wght@700&family=Pacifico&family=Passion+One&family=Patua+One&family=Permanent+Marker&family=Pirata+One&family=Poller+One&family=Press+Start+2P&family=Racing+Sans+One&family=Righteous&family=Rubik:wght@700&family=Russo+One&family=Sigmar+One&family=Skranji&family=Squada+One&family=Titan+One&family=Viga&family=Yanone+Kaffeesatz:wght@700&display=swap">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00CCFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pokémon TV">
<script src="pokemon-catalog.js"></script>
<script src="lang.js"></script>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
</head>
<body>
<script>const ACTIVE_PAGE = 'pokemon';</script>
<script src="header.js"></script>
<div id="app">
<div id="external-banner" class="external-banner hidden"></div>

<div id="section-pokemon" class="pokemon-desktop-layout">

    <!-- Live preview: full width top -->
    <div class="card card--preview" id="preview-card">
        <button id="preview-bg-toggle" title="Toggle preview background" onclick="togglePreviewBg()">☀</button>
        <p id="preview-msg" style="display:none"></p>
        <div id="preview-wrapper">
            <iframe id="preview-iframe" scrolling="no" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Bottom row: editor left, actions right -->
    <div class="pokemon-bottom-cols">
    <div class="desktop-col-left">

        <!-- Team -->
        <div class="card card--team">
            <div id="team-rows"></div>
        </div>

        <!-- Presets -->
        <div class="card card--presets">
            <div class="presets-bar" id="presets-bar"></div>
        </div>

        <!-- Settings -->
        <div class="card">
            <div class="settings-row">
                <label>
                    <span data-i18n="layout"></span>
                    <select id="layout-select">
                        <option value="horizontal" data-i18n="horizontal"></option>
                        <option value="vertical" data-i18n="vertical"></option>
                    </select>
                </label>
                <label><input type="checkbox" id="shadows-check" checked> <span data-i18n="showShadows"></span></label>
                <label><input type="checkbox" id="bg-check" checked> <span data-i18n="showBg"></span></label>
            </div>
        </div>

    </div><!-- /desktop-col-left -->
    <div class="pokemon-actions-col">

        <!-- Typography -->
        <div class="card card--typography">

            <!-- Font -->
            <div class="typo-row">
                <span class="typo-label">Font</span>
                <div class="font-dropdown" id="font-dropdown">
                    <div class="font-dropdown__trigger" id="font-trigger" onclick="toggleFontDropdown()">
                        <span id="font-selected-label">Anton</span>
                        <svg class="font-dropdown__caret" viewBox="0 0 10 6" width="10" height="6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                    </div>
                    <div class="font-dropdown__panel" id="font-panel"></div>
                </div>
            </div>

            <!-- Size -->
            <div class="typo-row">
                <span class="typo-label">Size</span>
                <input type="range" id="typo-size" min="20" max="35" value="35"
                       oninput="onTypoSize(this.value)">
                <span class="typo-val" id="typo-size-val">35px</span>
            </div>

            <!-- Colors + Stroke -->
            <div class="typo-row typo-row--colors">
                <span class="typo-label">Text</span>
                <div class="color-swatch" id="text-swatch" onclick="openPicker('text')" style="background:#ffffff"></div>

                <span class="typo-label typo-label--gap">Stroke</span>
                <div class="color-swatch" id="stroke-swatch" onclick="openPicker('stroke')" style="background:#000000"></div>
                <input type="range" id="typo-stroke" min="0" max="10" value="3" step="0.5"
                       oninput="onTypoStroke(this.value)">
                <span class="typo-val" id="typo-stroke-val">3px</span>
            </div>

            <!-- Name position -->
            <div class="typo-row">
                <span class="typo-label">Name</span>
                <div class="typo-pos-toggle">
                    <button id="pos-above" class="typo-pos-btn active" onclick="onNamePosition('above')">↑ Above</button>
                    <button id="pos-below" class="typo-pos-btn" onclick="onNamePosition('below')">↓ Below</button>
                </div>
            </div>

        </div>

        <!-- Color picker popover (shared) -->
        <div class="color-picker-popover hidden" id="color-picker">
            <canvas id="cp-canvas" width="220" height="140"></canvas>
            <div class="cp-thumb" id="cp-thumb"></div>
            <canvas id="cp-hue" width="220" height="14"></canvas>
            <div class="cp-hue-thumb" id="cp-hue-thumb"></div>
            <input type="text" class="cp-hex" id="cp-hex" maxlength="7" spellcheck="false">
        </div>

        <!-- Actions -->
        <div class="card card--actions">
            <div class="actions">
                <p id="obs-hint" class="obs-hint"></p>
                <button class="btn-publish" onclick="publishToObs()" data-i18n="publishBtn"></button>
                <button class="btn-reset" onclick="resetAll()" data-i18n="resetBtn"></button>
                <div id="status"></div>
            </div>
        </div>

    </div><!-- /pokemon-actions-col -->
    </div><!-- /pokemon-bottom-cols -->

</div><!-- /section-pokemon -->

<div id="section-badges" class="hidden desktop-layout">
<div class="desktop-col-left">

    <!-- Settings -->
    <div class="card">
        <div class="settings-row">
            <label>
                <span data-i18n-badge="badgeGame"></span>
                <select id="badge-game-select"></select>
            </label>
            <label>
                <span data-i18n-badge="badgeLayout"></span>
                <select id="badge-layout-select"></select>
            </label>
        </div>
    </div>

    <!-- Badge checkboxes -->
    <div class="card card--team">
        <div id="badge-checkboxes" class="badge-checkboxes"></div>
    </div>

    <!-- Brightness -->
    <div class="card">
        <div class="badge-brightness-row">
            <span data-i18n-badge="badgeBrightness"></span>
            <input type="range" id="badge-brightness" min="0" max="100" value="20"
                   oninput="updateBadgeBrightness(this.value)">
            <span id="badge-brightness-val">20%</span>
        </div>
    </div>

</div><!-- /desktop-col-left -->
<div class="desktop-col-right">

    <!-- Live preview -->
    <div class="card card--preview">
        <div id="badge-preview-wrapper">
            <iframe id="badge-preview-iframe" scrolling="no" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Actions -->
    <div class="card card--actions">
        <div class="actions">
            <p id="badge-obs-hint" class="obs-hint"></p>
            <button class="btn-publish" onclick="publishBadgesToObs()" data-i18n-badge="badgePublishBtn"></button>
            <button class="btn-reset" onclick="resetBadges()" data-i18n-badge="badgeResetBtn"></button>
            <div id="badge-status"></div>
        </div>
    </div>

</div><!-- /desktop-col-right -->
</div><!-- /section-badges -->

</div>

<!-- Properties modal -->
<div id="modal-backdrop">
    <div id="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-props"></div>
        <button class="modal-apply" onclick="applyModal()" data-i18n="modalSet"></button>
    </div>
</div>

<script src="app.js"></script>
<script src="badges.js"></script>

</body>
</html>
